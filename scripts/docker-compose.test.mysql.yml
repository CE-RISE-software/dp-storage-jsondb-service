services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: dp_storage_test
      MYSQL_USER: dp_storage
      MYSQL_PASSWORD: dp_storage
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
