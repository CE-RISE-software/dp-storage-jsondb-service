services:
    postgres:
        image: docker.io/library/postgres:17
        environment:
            POSTGRES_DB: dp_storage_test
            POSTGRES_USER: dp_storage
            POSTGRES_PASSWORD: dp_storage
        ports:
            - "5432:5432"
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -h 127.0.0.1 -U dp_storage -d dp_storage_test",
                ]
            interval: 5s
            timeout: 5s
            retries: 30
