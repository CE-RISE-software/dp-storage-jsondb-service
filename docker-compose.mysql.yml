services:
    dp-storage-jsondb-service:
        image: ${DP_STORAGE_IMAGE:-dp-storage-jsondb-service:latest}
        depends_on:
            mysql:
                condition: service_healthy
        environment:
            SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
            SERVER_PORT: ${SERVER_PORT:-8080}
            DB_BACKEND: mysql
            DB_HOST: mysql
            DB_PORT: ${DB_PORT:-3306}
            DB_NAME: ${DB_NAME:-dp_storage}
            DB_USER: ${DB_USER:-dp_storage}
            DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
            DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
            DB_TIMEOUT_MS: ${DB_TIMEOUT_MS:-5000}
            AUTH_MODE: ${AUTH_MODE:-jwt_jwks}
            AUTH_JWKS_URL: ${AUTH_JWKS_URL:-https://example.org/.well-known/jwks.json}
            AUTH_ISSUER: ${AUTH_ISSUER:-https://example.org/}
            AUTH_AUDIENCE: ${AUTH_AUDIENCE:-ce-rise}
        ports:
            - "${SERVICE_PORT_BIND:-8080}:${SERVER_PORT:-8080}"
        restart: unless-stopped

    mysql:
        image: mysql:8.4
        environment:
            MYSQL_DATABASE: ${DB_NAME:-dp_storage}
            MYSQL_USER: ${DB_USER:-dp_storage}
            MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD",
                ]
            interval: 5s
            timeout: 5s
            retries: 30
        restart: unless-stopped

volumes:
    mysql_data:
